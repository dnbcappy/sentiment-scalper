[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["venv", "__pycache__", ".pytest_cache", ".ruff_cache"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modernize syntax)
    "B",    # flake8-bugbear (likely bugs)
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
]
ignore = [
    "E501",  # line too long — formatter handles this
    "B008",  # function calls in defaults (Streamlit uses this pattern)
]

[tool.ruff.lint.isort]
known-first-party = ["signals", "prices", "backtest", "sentiment_scalper"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning:streamlit.*",
    "ignore::FutureWarning:pandas.*",
]
