name: Scrape NewsAPI hourly

# Cron syntax is UTC. Every 3 hours at minute 7 (avoids the round-hour
# stampede that hits a lot of free APIs at :00).
#
# NewsAPI Developer free tier is 100 requests / 24h. Each scraper run does
# 9 requests (one per ticker query). 8 runs/day * 9 = 72 req/day, leaving
# 28 req/day headroom for manual runs and price-refresh retries. Going
# more frequent means we'd hit 429s and lose runs anyway.
on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Only one scrape may run at a time — prevents overlapping if a run is slow
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENTIMENT_MODEL: vader
        run: python sentiment_scalper.py

      - name: Run price refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python prices.py
