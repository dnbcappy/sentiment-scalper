name: Keep dashboard awake

# Streamlit Community Cloud free tier sleeps apps after ~8-12h of no real
# (WebSocket) traffic. Plain HTTP pings — curl, UptimeRobot — get 200 OK
# back but don't count as activity, because Streamlit's sleep heuristic
# specifically tracks WebSocket sessions, not raw HTTPS hits.
#
# This workflow launches a real headless Chromium via Playwright, loads
# the dashboard, waits for the page title to render (proving the
# Streamlit script ran over a WebSocket), then closes. That counts as a
# real visit and resets the sleep timer.
#
# Free for public repos. Runs every 4 hours at :11 — well inside the
# observed 8-12h sleep window with margin for occasional skipped runs.

on:
  schedule:
    - cron: "11 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Wake dashboard via real browser session
        run: |
          python << 'PY'
          from playwright.sync_api import sync_playwright, TimeoutError as PWTimeout

          URL = "https://sentiment-scalper.streamlit.app/"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_context().new_page()

              try:
                  page.goto(URL, wait_until="networkidle", timeout=90_000)
              except PWTimeout:
                  print("Initial page load took >90s — continuing anyway")

              wake = page.locator('button:has-text("Yes, get this app back up")')
              if wake.count() > 0:
                  # App was sleeping. The click itself is the wake signal —
                  # Streamlit resets its sleep timer the moment it receives
                  # the wake request. We do NOT need to wait for the cold
                  # start (2-3 min) to complete; the server boots on its
                  # own. Job done as soon as the click registers.
                  print("App was asleep — clicking wake button")
                  wake.click()
                  page.wait_for_timeout(10_000)  # let the click hit the server
                  print("Wake signal sent. Server continues cold-start independently.")
              else:
                  # App was already awake. Confirm by waiting for the title
                  # to render — proves the WebSocket session is alive.
                  try:
                      page.wait_for_selector(
                          'h1:has-text("Sentiment Scalper")', timeout=60_000
                      )
                      print("Dashboard awake — WebSocket session confirmed")
                  except PWTimeout:
                      print(
                          "WARN: title selector timed out but page reachable — "
                          "continuing without failing the job"
                      )
                  page.wait_for_timeout(5_000)

              browser.close()
              print("Keepalive ping complete.")
          PY
